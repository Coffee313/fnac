# FreeRADIUS Performance Optimization Configuration
# For handling 1000+ requests per second
#
# Add this to /etc/freeradius/3.0/radiusd.conf or include it

# Thread pool configuration for high throughput
thread pool {
    # Start with more threads
    start_servers = 32
    
    # Allow up to 256 threads
    max_servers = 256
    
    # Keep at least 8 spare threads
    min_spare_servers = 8
    
    # Keep at most 32 spare threads
    max_spare_servers = 32
    
    # Don't limit requests per server (0 = unlimited)
    max_requests_per_server = 0
    
    # Increase timeout for slow operations
    max_request_time = 30
}

# Network optimization
listen {
    type = auth
    port = 1812
    ipaddr = *
    
    # Increase socket buffer sizes for high throughput
    recv_buff = 65536
    send_buff = 65536
}

listen {
    type = acct
    port = 1813
    ipaddr = *
    
    # Increase socket buffer sizes
    recv_buff = 65536
    send_buff = 65536
}

# Connection pool for database (if using SQL)
# Uncomment if using SQL backend
# pool {
#     start = 5
#     min = 3
#     max = 10
#     spare = 3
#     uses = 0
#     lifetime = 0
#     idle_timeout = 60
# }

# Logging optimization
log {
    # Use syslog for better performance
    destination = syslog
    
    # Only log important events
    level = info
}

# Disable unnecessary modules for performance
# In the modules section, comment out:
# - ldap
# - sql (unless needed)
# - perl
# - python
# - exec
# - detail
# - linelog
# - etc.

