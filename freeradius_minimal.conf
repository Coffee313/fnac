prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = /usr/sbin
logdir = /var/log/freeradius
raddbdir = /etc/freeradius/3.0
radacctdir = /var/log/freeradius/radacct

name = radiusd

security {
	max_attributes = 200
	reject_delay = 1
	status_server = yes
}

log {
	destination = files
	file = ${logdir}/radius.log
	syslog_facility = daemon
	stripped_names = no
	auth = no
	auth_badpass = no
	auth_goodpass = no
}

checkrad = /usr/sbin/checkrad

listen {
	type = auth
	ipaddr = *
	port = 1812
	proto = udp
}

listen {
	type = acct
	ipaddr = *
	port = 1813
	proto = udp
}

listen {
	type = auth
	ipv6addr = ::
	port = 1812
	proto = udp
}

listen {
	type = acct
	ipv6addr = ::
	port = 1813
	proto = udp
}

modules {
	$INCLUDE mods-enabled/
}

server default {
	authorize {
		preprocess
		auth_log
		files
	}

	authenticate {
		Auth-Type PAP {
			pap
		}
	}

	accounting {
		detail
		unix
		exec
		attr_filter.accounting_response
	}

	session {
	}

	post-auth {
		Post-Auth-Type REJECT {
			attr_filter.access_reject
			eap
			remove_reply_message_if_eap
		}
		Post-Auth-Type Challenge {
		}
		exec
		remove_reply_message_if_eap
	}

	pre-proxy {
	}

	post-proxy {
		eap
	}
}
